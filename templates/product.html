{% extends 'master.html' %}


{% block content %}



    <style>
        main {
            display: none;
        }

        .product-container {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
            flex-wrap: wrap;
            width: 85%;
            background-color: #f1eada;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgb(0, 0, 0, 0.3);
            gap: 30px;
            margin: 100px auto 30px auto
        }

        /* ===== PRODUCT IMAGE ===== */
        .product-image {
            flex: 1 1 200px; /* flexible width with minimum 200px */
            max-width: 500px;
            text-align: center;
        }

        .product-image img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            object-fit: cover;
        }

        /* ===== PRODUCT DETAILS ===== */
        .product-details {
            flex: 2 1 300px; /* flexible width for details */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 10px;
        }

        /* Category */
        .product-details span {
            font-size: 14px;
            font-weight: 500;
            color: #98755b;
            text-transform: uppercase;
        }

        /* Title */
        .product-details .title {
            font-size: 24px;
            font-weight: bold;
            color: #3d1f12;
        }

        /* Price */
        .product-details .price {
            font-size: 20px;
            font-weight: 600;
            color: #E07C24;
        }

        /* Description */
        .product-details .description {
            font-size: 16px;
            color: #584738;
            line-height: 1.4;
        }

        /* ===== ADD TO CART BUTTON ===== */
        .quantity-cart .add-cart {
            margin-top: 15px;
        }

        .btn_add_to_cart {
            background-color: #7F5539;
            border: none;
            color: #f1eada;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        .btn_add_to_cart:hover {
            background-color: #3d1f12;
            transform: scale(1.05);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 800px) {
            .product-container {
                flex-direction: column;
                align-items: center;
            }

            .product-image, .product-details {
                max-width: 100%;
                text-align: center;
            }

            .product-details {
                align-items: center;
            }

        }
    </style>
    <div class="product-container">
        <div class="product-image">
            <img src="{{ product['image'] }}" alt="{{ product['title'] }}">
        </div>
        <div class="product-details">
            <div>
                <span>{{ product['category'] }}</span>
            </div>
            <div class="title">{{ product['title'] }}</div>
            <div class="price">${{ product['price'] }}</div>
            <div class="description">{{ product['description'] }}</div>


            <div class="quantity-cart">
                <div class="add-cart">
                    <input type="button"
                           class="btn btn-outline-primary btn_add_to_cart"
                           value="Add To Cart"
                           data-id="{{ product['id'] }}"
                           data-title="{{ product['title'] }}"
                           data-image="{{ product['image'] }}"
                           data-price="{{ product['price'] }}"
                    >
                </div>
            </div>
        </div>
    </div>
    <script>
        function changeQuantity(amount) {
            let input = document.getElementById("quantity");
            let current = parseInt(input.value) || 0;
            let newValue = current + amount;
            if (newValue < 1) newValue = 1; // prevent going below 1
            input.value = newValue;
            localStorage.setItem("productQuantity", newValue);
        }

        document.addEventListener("DOMContentLoaded", function () {
            let savedQuantity = localStorage.getItem("productQuantity");
            if (savedQuantity) {
                document.getElementById("quantity").value = savedQuantity;
            }
        });
    </script>
{% endblock %}
